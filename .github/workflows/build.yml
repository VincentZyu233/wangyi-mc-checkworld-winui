name: Build and Release

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    name: Check triggers
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          VERSION=$(grep -oP '<Version>\K[^<]+' WangyiMCCheckworld.csproj)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check triggers
        id: check
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "should_release=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          if echo "$COMMIT_MSG" | grep -qi "build release"; then
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "should_release=true" >> $GITHUB_OUTPUT
          elif echo "$COMMIT_MSG" | grep -qi "build action"; then
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "should_release=false" >> $GITHUB_OUTPUT
          else
            echo "should_build=false" >> $GITHUB_OUTPUT
            echo "should_release=false" >> $GITHUB_OUTPUT
          fi

  build:
    name: Build
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: windows-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore /p:GITHUB_ACTIONS=true

      - name: Publish
        run: dotnet publish -c Release -r win-x64 -o publish --no-build --self-contained true -p:WindowsAppSDKSelfContained=true

      - name: Prepare release
        shell: pwsh
        run: |
          $version = "${{ needs.check.outputs.version }}"
          if (Test-Path release) { Remove-Item release -Recurse -Force }
          New-Item -ItemType Directory -Path release | Out-Null

          # Copy exe (for backwards compatibility)
          Copy-Item -Path "publish\WangyiMCCheckworld.exe" -Destination "release\WangyiMCCheckworld-v$version-windows-x64.exe"

          # Create a ZIP containing the full publish output
          $zipPath = "release\WangyiMCCheckworld-v$version-windows-x64.zip"
          if (Test-Path $zipPath) { Remove-Item $zipPath }
          Compress-Archive -Path "publish\*" -DestinationPath $zipPath

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: WangyiMCCheckworld-v${{ needs.check.outputs.version }}-windows-x64
          path: release/*

  release:
    name: Publish Release
    needs: [check, build]
    if: needs.check.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.check.outputs.version }}
          name: Release v${{ needs.check.outputs.version }}
          files: WangyiMCCheckworld-v${{ needs.check.outputs.version }}-windows-x64-exe/*.exe
          draft: false