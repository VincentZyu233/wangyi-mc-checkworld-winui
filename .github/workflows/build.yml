name: Build and Release

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: windows-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore /p:GITHUB_ACTIONS=true

      - name: Get version
        id: version
        run: |
          $VERSION = Select-String -Path "WangyiMCCheckworld.csproj" -Pattern '<Version>(.*?)</Version>' | ForEach-Object { $_.Matches.Groups[1].Value }
          echo "version=$VERSION" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Publish
        run: dotnet publish -c Release -r win-x64 -o publish --no-build --self-contained true -p:WindowsAppSDKSelfContained=true

      - name: Prepare release
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          if (Test-Path release) { Remove-Item release -Recurse -Force }
          New-Item -ItemType Directory -Path release | Out-Null

          # Copy exe (for backwards compatibility)
          Copy-Item -Path "publish\WangyiMCCheckworld.exe" -Destination "release\WangyiMCCheckworld-v$version-windows-x64.exe"

          # Create a ZIP containing the full publish output
          $zipPath = "release\WangyiMCCheckworld-v$version-windows-x64.zip"
          if (Test-Path $zipPath) { Remove-Item $zipPath }
          Compress-Archive -Path "publish\*" -DestinationPath $zipPath

          # List files for debugging
          Write-Host "Release directory contents:"  
          Get-ChildItem -Path release -Recurse

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: WangyiMCCheckworld-v${{ steps.version.outputs.version }}-windows-x64
          path: release/*

  release:
    name: Publish Release
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          VERSION=$(grep -oP '<Version>\K[^<]+' WangyiMCCheckworld.csproj)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: WangyiMCCheckworld-v${{ steps.version.outputs.version }}-windows-x64

      - name: List downloaded files
        run: |
          echo "Downloaded artifacts:"  
          ls -la
          ls -la WangyiMCCheckworld-v${{ steps.version.outputs.version }}-windows-x64/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Release v${{ steps.version.outputs.version }}
          files: |
            WangyiMCCheckworld-v${{ steps.version.outputs.version }}-windows-x64/*.exe
            WangyiMCCheckworld-v${{ steps.version.outputs.version }}-windows-x64/*.zip
          draft: false