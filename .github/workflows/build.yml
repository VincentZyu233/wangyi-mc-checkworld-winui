name: Build and Release

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    name: Check triggers
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          VERSION=$(grep -oP '<Version>\K[^<]+' WangyiMCCheckworld.csproj)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check triggers
        id: check
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "should_release=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          if echo "$COMMIT_MSG" | grep -qi "build release"; then
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "should_release=true" >> $GITHUB_OUTPUT
          elif echo "$COMMIT_MSG" | grep -qi "build action"; then
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "should_release=false" >> $GITHUB_OUTPUT
          else
            echo "should_build=false" >> $GITHUB_OUTPUT
            echo "should_release=false" >> $GITHUB_OUTPUT
          fi

  build:
    name: Build
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: windows-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build
        run: dotnet build -c Release /p:GITHUB_ACTIONS=true /p:UseXamlCompilerExecutable=false

      - name: Publish
        run: dotnet publish -c Release -o publish

      - name: Prepare release
        shell: bash
        run: |
          VERSION="${{ needs.check.outputs.version }}"
          mkdir -p release
          cp "publish/WangyiMCCheckworld.exe" "release/WangyiMCCheckworld-v${VERSION}-windows-x64.exe"

      - name: Upload exe
        uses: actions/upload-artifact@v4
        with:
          name: WangyiMCCheckworld-v${{ needs.check.outputs.version }}-windows-x64-exe
          path: release/*.exe

  release:
    name: Publish Release
    needs: [check, build]
    if: needs.check.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.check.outputs.version }}
          name: Release v${{ needs.check.outputs.version }}
          files: WangyiMCCheckworld-v${{ needs.check.outputs.version }}-windows-x64-exe/*.exe
          draft: false